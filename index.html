<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexaFlow Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif' font-weight='700'>N</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-app:#0b0d14;--bg-card:#111520;--bg-card2:#181d2c;--bg-glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);--border-hi:rgba(99,102,241,0.5);
  --text-1:#eef2ff;--text-2:#7c8898;--text-3:#3d4659;
  --indigo:#6366f1;--indigo-hi:#a5b4fc;--indigo-lo:rgba(99,102,241,0.14);
  --emerald:#10b981;--amber:#f59e0b;--sky:#0ea5e9;--violet:#8b5cf6;--rose:#f43f5e;
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --r1:7px;--r2:13px;--trans:0.17s cubic-bezier(.4,0,.2,1);
  --sidebar-w:215px;
}
[data-theme="light"]{
  --bg-app:#f0f4ff;--bg-card:#ffffff;--bg-card2:#f6f8ff;--bg-glass:rgba(0,0,0,0.025);
  --border:rgba(0,0,0,0.09);--border-hi:rgba(99,102,241,0.4);
  --text-1:#0f172a;--text-2:#475569;--text-3:#94a3b8;--indigo-lo:rgba(99,102,241,0.09);
}
html,body{height:100%;font-family:var(--font);background:var(--bg-app);color:var(--text-1);}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--bg-card);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:width var(--trans);overflow:hidden;
}
.sidebar.collapsed{width:58px;}
.sb-logo{display:flex;align-items:center;gap:11px;padding:19px 15px;border-bottom:1px solid var(--border);min-height:64px;}
.logo-mark{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;letter-spacing:-.5px;
}
.logo-text{overflow:hidden;white-space:nowrap;transition:opacity var(--trans);}
.logo-name{font-size:14.5px;font-weight:600;color:var(--text-1);}
.logo-sub{font-size:10px;color:var(--text-2);}
.sidebar.collapsed .logo-text{opacity:0;width:0;pointer-events:none;}
.sidebar.collapsed .nav-lbl{opacity:0;width:0;pointer-events:none;overflow:hidden;}
.sidebar.collapsed .user-info{opacity:0;width:0;pointer-events:none;overflow:hidden;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:3px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r1);
  cursor:pointer;color:var(--text-2);font-size:13.5px;font-weight:500;
  white-space:nowrap;border:none;background:none;width:100%;text-align:left;
  font-family:var(--font);transition:background var(--trans),color var(--trans);
}
.nav-item:hover{background:var(--bg-glass);color:var(--text-1);}
.nav-item.active{background:var(--indigo-lo);color:var(--indigo-hi);}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;line-height:1;}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.user-chip{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r1);}
.avatar{
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
  font-weight:600;flex-shrink:0;
}
.av-sm{width:28px;height:28px;font-size:11px;}
.av-md{width:38px;height:38px;font-size:14px;}
.user-name{font-size:13px;font-weight:500;color:var(--text-1);white-space:nowrap;}
.user-role-lbl{font-size:10.5px;color:var(--text-2);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{
  height:64px;border-bottom:1px solid var(--border);background:var(--bg-card);
  display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;
}
.tb-title{font-size:16px;font-weight:600;}
.tb-sub{font-size:11px;color:var(--text-2);margin-top:1px;}
.icon-btn{
  width:36px;height:36px;border-radius:var(--r1);border:1px solid var(--border);
  background:var(--bg-card2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-2);font-size:16px;transition:all var(--trans);font-family:var(--font);
  position:relative;flex-shrink:0;
}
.icon-btn:hover{color:var(--text-1);border-color:var(--border-hi);background:var(--indigo-lo);}
.notif-dot{width:8px;height:8px;border-radius:50%;background:#f43f5e;position:absolute;top:5px;right:5px;border:2px solid var(--bg-card);}
.content{flex:1;overflow-y:auto;padding:24px;}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;}
.card-sm{padding:16px;}
.card-lbl{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:5px;}
.card-val{font-size:26px;font-weight:600;line-height:1.1;}
.card-sub{font-size:11.5px;color:var(--text-2);margin-top:4px;}

/* GRIDS */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.grid-main{display:grid;grid-template-columns:1fr 320px;gap:18px;}
.col-stack{display:flex;flex-direction:column;gap:18px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:100px;font-size:12px;font-weight:500;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10.5px;font-weight:500;}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;
  border-radius:var(--r1);font-size:13.5px;font-weight:500;cursor:pointer;
  transition:all var(--trans);border:none;font-family:var(--font);
}
.btn-primary{background:#6366f1;color:#fff;}
.btn-primary:hover{background:#4f46e5;}
.btn-outline{background:transparent;color:var(--text-2);border:1px solid var(--border);}
.btn-outline:hover{color:var(--text-1);border-color:var(--border-hi);background:var(--indigo-lo);}
.btn-danger{background:rgba(244,63,94,.12);color:#fb7185;border:1px solid rgba(244,63,94,.25);}
.btn-danger:hover{background:rgba(244,63,94,.2);}
.btn-success{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}
.btn-success:hover{background:rgba(16,185,129,.2);}
.btn-sm{padding:6px 12px;font-size:12.5px;}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.sa-row{display:flex;flex-wrap:wrap;gap:9px;}

/* SECTION */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.sec-title{font-size:13.5px;font-weight:600;}

/* TIMELINE */
.tl{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:12px;padding:9px 0;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:16px;top:34px;width:1px;height:calc(100% - 12px);background:var(--border);}
.tl-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid;}
.tl-lbl{font-size:13px;font-weight:500;}
.tl-time{font-size:11.5px;color:var(--text-2);font-family:var(--mono);margin-top:2px;}

/* BAR CHART */
.bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px;}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;}
.bar-stack{display:flex;flex-direction:column-reverse;gap:2px;width:100%;flex:1;}
.bar-seg{width:100%;border-radius:3px 3px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1);}
.bar-lbl{font-size:9.5px;color:var(--text-2);margin-top:6px;flex-shrink:0;}

/* DONUT */
.donut-wrap{display:flex;justify-content:center;margin:12px 0;}

/* QUICK LINKS */
.ql-item{
  display:flex;align-items:center;gap:11px;padding:11px 13px;
  border-radius:var(--r1);border:1px solid var(--border);background:var(--bg-card2);
  cursor:pointer;transition:all var(--trans);text-decoration:none;color:var(--text-1);
  margin-bottom:8px;
}
.ql-item:hover{border-color:var(--border-hi);background:var(--indigo-lo);}
.ql-icon{width:34px;height:34px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}

/* PROGRESS */
.prog{height:5px;border-radius:100px;background:var(--border);overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:100px;transition:width .7s cubic-bezier(.4,0,.2,1);}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;color:var(--text-2);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}

/* FORM */
.input{
  background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--r1);
  padding:9px 13px;font-size:13.5px;color:var(--text-1);font-family:var(--font);
  width:100%;outline:none;transition:border var(--trans);
}
.input:focus{border-color:#6366f1;}
.input::placeholder{color:var(--text-3);}
.field-lbl{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:6px;display:block;}
.field-grp{margin-bottom:15px;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg-card2);border-radius:var(--r1);padding:3px;margin-bottom:18px;}
.tab{flex:1;padding:7px;text-align:center;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--text-2);transition:all var(--trans);border:none;background:none;font-family:var(--font);}
.tab.active{background:var(--bg-card);color:var(--text-1);box-shadow:0 1px 4px rgba(0,0,0,.25);}

/* SEP */
.sep{height:1px;background:var(--border);margin:16px 0;}

/* PIE LEGEND */
.pie-row{display:flex;align-items:center;margin-bottom:9px;font-size:12.5px;}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:8px;}
.pie-name{color:var(--text-2);flex:1;}
.pie-val{font-weight:500;font-family:var(--mono);font-size:12px;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-app);}
.auth-card{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:32px;}
.auth-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.auth-sub{font-size:14px;color:var(--text-2);margin-bottom:28px;}
.err-msg{font-size:12px;color:#fb7185;margin-top:8px;min-height:18px;}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.pulse{animation:pulse 2s infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .3s ease both;}

/* LEGEND */
.legend-row{display:flex;gap:14px;font-size:11px;color:var(--text-2);}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* RESPONSIVE */
@media(max-width:960px){
  .grid4{grid-template-columns:repeat(2,1fr);}
  .grid-main{grid-template-columns:1fr;}
  .sidebar{width:58px;}
  .sidebar .logo-text,.sidebar .nav-lbl,.sidebar .user-info{opacity:0;width:0;pointer-events:none;}
}
@media(max-width:600px){
  .content{padding:14px;}
  .grid4{grid-template-columns:1fr 1fr;}
  .topbar{padding:0 14px;gap:8px;}
}
</style>
</head>
<body data-theme="dark">
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// CONFIG — only real users, no mock data
// ═══════════════════════════════════════════════════
const USERS = [
  {id:1, name:"Abhishek Mishra", email:"connect@nexaflow.bar",  role:"Admin", avatar:"AM", pass:"admin@123"},
  {id:2, name:"Priya Sharma",    email:"priya@nexaflow.bar",    role:"Staff", avatar:"PS", pass:"priya@123"},
  {id:3, name:"Rohan Das",       email:"rohan@nexaflow.bar",    role:"Staff", avatar:"RD", pass:"rohan@123"},
];

const STATUS_CFG = {
  "checked-in":  {label:"Checked In",   color:"#10b981", bg:"rgba(16,185,129,.14)", icon:"●"},
  "checked-out": {label:"Checked Out",  color:"#64748b", bg:"rgba(100,116,139,.12)",icon:"○"},
  "break":       {label:"On Break",     color:"#f59e0b", bg:"rgba(245,158,11,.14)", icon:"◐"},
  "meeting":     {label:"In Meeting",   color:"#0ea5e9", bg:"rgba(14,165,233,.14)", icon:"◈"},
  "call":        {label:"On a Call",    color:"#8b5cf6", bg:"rgba(139,92,246,.14)", icon:"◉"},
  "focus":       {label:"Focus Mode",   color:"#d946ef", bg:"rgba(217,70,239,.14)", icon:"◎"},
};

const QUICK_LINKS = [
  {icon:"💬", label:"WhatsApp Web",    sub:"Open messaging",   href:"https://web.whatsapp.com",        bg:"rgba(37,211,102,.12)"},
  {icon:"🧩", label:"Zoho CRM",        sub:"Customer portal",  href:"https://crm.zoho.com",            bg:"rgba(99,102,241,.12)"},
  {icon:"📅", label:"Google Calendar", sub:"View schedule",    href:"https://calendar.google.com",     bg:"rgba(234,67,53,.12)"},
  {icon:"📊", label:"Google Sheets",   sub:"Spreadsheets",     href:"https://sheets.google.com",       bg:"rgba(14,165,233,.12)"},
  {icon:"🗂️", label:"Notion",          sub:"Docs & tasks",     href:"https://notion.so",               bg:"rgba(255,255,255,.08)"},
  {icon:"📧", label:"Gmail",           sub:"Check inbox",      href:"https://mail.google.com",         bg:"rgba(234,67,53,.08)"},
];

// ═══════════════════════════════════════════════════
// PERSISTENT STATE (localStorage per user)
// ═══════════════════════════════════════════════════
const APP = {
  user:      null,
  theme:     localStorage.getItem("nf-theme") || "dark",
  page:      "dashboard",
  collapsed: window.innerWidth < 960,
  // per-session (loaded after login)
  status:    "checked-out",
  timeline:  [],
  notif:     0,
};

function getStorageKey(uid, key){ return `nf_u${uid}_${key}`; }

function saveUserState(){
  if(!APP.user) return;
  const uid = APP.user.id;
  localStorage.setItem(getStorageKey(uid,"status"),   APP.status);
  localStorage.setItem(getStorageKey(uid,"timeline"), JSON.stringify(APP.timeline));
}

function loadUserState(user){
  const uid = user.id;
  const status   = localStorage.getItem(getStorageKey(uid,"status"))   || "checked-out";
  const rawTl    = localStorage.getItem(getStorageKey(uid,"timeline"));
  let timeline   = [];
  try { timeline = rawTl ? JSON.parse(rawTl) : []; } catch(e){ timeline=[]; }
  return {status, timeline};
}

function setState(patch){
  Object.assign(APP, patch);
  if(APP.user) saveUserState();
  render();
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function now5(){
  return new Date().toTimeString().slice(0,5);
}
function nowDate(){
  return new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
function elapsed(startHHMM){
  if(!startHHMM) return 0;
  const [h,m] = startHHMM.split(":").map(Number);
  const now = new Date();
  const st  = new Date();
  st.setHours(h, m, 0, 0);
  return Math.max(0, Math.round((now - st) / 60000));
}
function fmt(min){
  if(min === null || min === undefined || isNaN(min)) return "—";
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ═══════════════════════════════════════════════════
// DOM BUILDER — safe, no [object Object]
// ═══════════════════════════════════════════════════
function el(tag, attrs, ...kids){
  const isSvg = ["svg","circle","polyline","path"].includes(tag);
  const e = isSvg
    ? document.createElementNS("http://www.w3.org/2000/svg", tag)
    : document.createElement(tag);

  if(attrs && typeof attrs === "object"){
    for(const [k, v] of Object.entries(attrs)){
      if(v === null || v === false || v === undefined) continue;
      if(k === "class"){
        e.className = v;
      } else if(k === "style" && typeof v === "object"){
        Object.assign(e.style, v);
      } else if(k === "on" && typeof v === "object"){
        for(const [ev, fn] of Object.entries(v)){
          e.addEventListener(ev, fn);
        }
      } else {
        try { e.setAttribute(k, v); } catch(err){}
      }
    }
  }

  function appendKid(k){
    if(k === null || k === undefined || k === false) return;
    if(Array.isArray(k)){ k.forEach(appendKid); return; }
    if(typeof k === "string" || typeof k === "number"){
      e.appendChild(document.createTextNode(String(k)));
    } else if(k instanceof Node){
      e.appendChild(k);
    }
    // silently skip anything else (prevents [object Object])
  }
  kids.forEach(appendKid);
  return e;
}

function div(cls, ...kids){
  if(cls && typeof cls === "object" && !(cls instanceof Node)){
    // called as div({style:...}, ...kids)
    return el("div", cls, ...kids);
  }
  return el("div", cls ? {class:cls} : null, ...kids);
}
function span(cls, ...kids){ return el("span", cls ? {class:cls} : null, ...kids); }

function mkBtn(cls, label, onClick, disabled){
  const b = el("button", {class:`btn ${cls}`, ...(disabled?{disabled:true}:{})});
  b.textContent = label;
  if(onClick) b.addEventListener("click", onClick);
  return b;
}

// ═══════════════════════════════════════════════════
// UI COMPONENTS
// ═══════════════════════════════════════════════════
function Avatar(initials, size){
  size = size || "sm";
  return div(`avatar av-${size}`, initials);
}

function StatusBadge(status){
  const c = STATUS_CFG[status] || STATUS_CFG["checked-out"];
  const badge = div("badge");
  badge.style.background = c.bg;
  badge.style.color = c.color;
  const dot = span();
  dot.textContent = c.icon;
  if(status !== "checked-out") dot.classList.add("pulse");
  badge.appendChild(dot);
  badge.appendChild(document.createTextNode(" " + c.label));
  return badge;
}

function StatCard(label, value, sub){
  const c = div("card card-sm");
  const lbl = div("card-lbl"); lbl.textContent = label;
  const val = div("card-val"); val.textContent = String(value);
  c.appendChild(lbl);
  c.appendChild(val);
  if(sub){
    const s = div("card-sub"); s.textContent = sub;
    c.appendChild(s);
  }
  c.classList.add("fade-up");
  return c;
}

// Bar chart — built purely, no chance of [object Object]
function WeeklyBar(data, maxOverride){
  const max = maxOverride || Math.max(...data.map(d => d.active + d.breaks + d.meetings + d.call + d.focus), 0.1);
  const wrap = div("bar-wrap");

  data.forEach(d => {
    const total = d.active + d.breaks + d.meetings + d.call + d.focus;
    const col = div("bar-col");
    const stack = div("bar-stack");
    stack.style.height = "100px";
    stack.style.display = "flex";
    stack.style.flexDirection = "column-reverse";
    stack.style.gap = "2px";

    function makeSeg(v, color){
      const s = div("bar-seg");
      s.style.height = max > 0 ? `${(v / max) * 100}%` : "0%";
      s.style.background = color;
      s.style.minHeight = "0";
      s.style.flexShrink = "0";
      return s;
    }

    stack.appendChild(makeSeg(d.active,   "#6366f1"));
    stack.appendChild(makeSeg(d.breaks,   "#f59e0b"));
    stack.appendChild(makeSeg(d.meetings, "#0ea5e9"));
    stack.appendChild(makeSeg(d.call,     "#8b5cf6"));
    stack.appendChild(makeSeg(d.focus,    "#d946ef"));

    const lbl = div("bar-lbl"); lbl.textContent = d.day;

    col.style.display = "flex";
    col.style.flexDirection = "column";
    col.style.alignItems = "center";
    col.style.flex = "1";

    col.appendChild(stack);
    col.appendChild(lbl);
    wrap.appendChild(col);
  });
  return wrap;
}

// Donut — pure SVG, no [object Object]
function DonutChart(segments){
  const r = 40, cx = 50, cy = 50, sw = 14;
  const circ = 2 * Math.PI * r;
  const total = segments.reduce((a, s) => a + s.v, 0) || 1;
  const svg = el("svg", {viewBox:"0 0 100 100", width:"100", height:"100"});

  let offset = 0;
  segments.forEach(s => {
    const dash = (s.v / total) * circ;
    const c = el("circle", {
      cx: cx, cy: cy, r: r,
      fill: "none",
      stroke: s.color,
      "stroke-width": sw,
      "stroke-dasharray": `${dash} ${circ - dash}`,
      "stroke-dashoffset": `${circ * 0.25 - offset}`,
      "stroke-linecap": "round",
    });
    svg.appendChild(c);
    offset += dash;
  });

  // centre text
  const bg = el("circle", {cx, cy, r: r - sw/2 - 2, fill:"var(--bg-card2)"});
  svg.insertBefore(bg, svg.firstChild);

  return svg;
}

// ── DASHBOARD ───────────────────────────────────────
function DashboardView(){
  const {status, timeline} = APP;

  // Compute totals from real timeline
  let workMin = 0, breakMin = 0, meetMin = 0, callMin = 0, focusMin = 0;
  const completed = timeline.filter(t => t.end && t.duration !== null && t.duration !== undefined);
  completed.forEach(t => {
    if(t.type === "checked-in") workMin  += t.duration;
    if(t.type === "break")      breakMin += t.duration;
    if(t.type === "meeting")    meetMin  += t.duration;
    if(t.type === "call")       callMin  += t.duration;
    if(t.type === "focus")      focusMin += t.duration;
  });
  // Add current open session
  const last = timeline.length ? timeline[timeline.length - 1] : null;
  const curMin = (last && !last.end) ? elapsed(last.start) : 0;
  if(last && !last.end){
    if(last.type === "checked-in") workMin  += curMin;
    if(last.type === "break")      breakMin += curMin;
    if(last.type === "meeting")    meetMin  += curMin;
    if(last.type === "call")       callMin  += curMin;
    if(last.type === "focus")      focusMin += curMin;
  }

  const totalMin = workMin + breakMin + meetMin + callMin + focusMin;

  // Status change handler
  function changeStatus(ns){
    const t = now5();
    let tl = [...timeline];
    if(tl.length){
      const prev = tl[tl.length - 1];
      if(!prev.end){
        tl[tl.length - 1] = {...prev, end: t, duration: elapsed(prev.start)};
      }
    }
    if(ns !== "checked-out"){
      tl.push({id: Date.now(), type: ns, start: t, end: null, duration: null});
    }
    setState({status: ns, timeline: tl});
  }

  const wrap = div("fade-up");

  // ── Stat row ──
  const statRow = div("grid4");
  [
    StatCard("Today's Work",  fmt(workMin),   "Active time logged"),
    StatCard("Break Time",    fmt(breakMin),  "Total rest"),
    StatCard("Meetings",      fmt(meetMin),   "In meetings today"),
    StatCard("Total Logged",  fmt(totalMin),  "All sessions today"),
  ].forEach(c => statRow.appendChild(c));

  // ── Status + Actions ──
  const statusCard = div("card");
  const shdr = div("sec-hdr");
  const sttl = div("sec-title"); sttl.textContent = "Your Status";
  shdr.appendChild(sttl);
  shdr.appendChild(StatusBadge(status));
  statusCard.appendChild(shdr);

  const saRow = div("sa-row");
  const ACTIONS = [
    {key:"checked-in",  label:"Check In",  cls:"btn-success", disabled: status !== "checked-out"},
    {key:"checked-out", label:"Check Out", cls:"btn-danger",  disabled: status === "checked-out"},
    {key:"break",       label:"Break",     cls:"btn-outline", disabled: status === "checked-out" || status === "break"},
    {key:"meeting",     label:"Meeting",   cls:"btn-outline", disabled: status === "checked-out" || status === "meeting"},
    {key:"call",        label:"Call",      cls:"btn-outline", disabled: status === "checked-out" || status === "call"},
    {key:"focus",       label:"Focus",     cls:"btn-outline", disabled: status === "checked-out" || status === "focus"},
  ];
  ACTIONS.forEach(a => {
    saRow.appendChild(mkBtn(a.cls + " btn-sm", a.label, () => changeStatus(a.key), a.disabled));
  });
  statusCard.appendChild(saRow);

  // ── Timeline ──
  const tlCard = div("card");
  const thdr = div("sec-hdr");
  const tttl = div("sec-title"); tttl.textContent = "Today's Timeline";
  thdr.appendChild(tttl);
  tlCard.appendChild(thdr);

  const tlWrap = div("tl");
  if(timeline.length === 0){
    const empty = div(); empty.style.cssText = "color:var(--text-2);font-size:13px;text-align:center;padding:20px 0;";
    empty.textContent = "No activity yet. Click Check In to start.";
    tlWrap.appendChild(empty);
  } else {
    [...timeline].reverse().forEach(t => {
      const c = STATUS_CFG[t.type] || STATUS_CFG["checked-in"];
      const item = div("tl-item");

      const dot = div("tl-dot");
      dot.style.borderColor = c.color;
      dot.style.color       = c.color;
      dot.style.background  = c.bg;

      const body = div();
      const lbl  = div("tl-lbl"); lbl.textContent = c.label;
      const time = div("tl-time");
      let timeStr = t.start;
      if(t.end) timeStr += ` → ${t.end}`;
      else       timeStr += " → now";
      if(t.duration !== null && t.duration !== undefined) timeStr += ` · ${fmt(t.duration)}`;
      time.textContent = timeStr;
      body.appendChild(lbl); body.appendChild(time);

      item.appendChild(dot); item.appendChild(body);

      if(!t.end){
        const tag = span("tag"); tag.textContent = "active";
        tag.style.cssText = "background:var(--indigo-lo);color:var(--indigo-hi);margin-left:auto;";
        item.appendChild(tag);

    {l:"Breaks",      v:breakMin, color:"#f59e0b"},
    {l:"Meetings",    v:meetMin,  color:"#0ea5e9"},
    {l:"Calls",       v:callMin,  color:"#8b5cf6"},
    {l:"Focus",       v:focusMin, color:"#d946ef"},
  ].filter(d => d.v > 0);

  if(distData.length){
    const dWrap = div("donut-wrap");
    dWrap.appendChild(DonutChart(distData));
    distCard.appendChild(dWrap);
    const distTotal = distData.reduce((a,d) => a+d.v, 0) || 1;
    distData.forEach(d => {
      const row = div("pie-row");

    const info = div();
    const iName = div(); iName.style.cssText = "font-size:13px;font-weight:500;"; iName.textContent = lk.label;
    const iSub  = div(); iSub.style.cssText  = "font-size:11px;color:var(--text-2);"; iSub.textContent  = lk.sub;
    info.appendChild(iName); info.appendChild(iSub);
    const arrow = span(); arrow.style.cssText = "margin-left:auto;color:var(--text-3);font-size:12px;"; arrow.textContent = "↗";
    a.appendChild(icon); a.appendChild(info); a.appendChild(arrow);
    qlCard.appendChild(a);
  });

  // ── Layout ──
  const right = div("col-stack");
  [statusCard, distCard, qlCard].forEach(c => right.appendChild(c));

  const left = div("col-stack");
  left.appendChild(tlCard);

  const main = div("grid-main");
  main.appendChild(left); main.appendChild(right);

  wrap.appendChild(statRow);
  wrap.appendChild(main);
  return wrap;
}

      const th = el("th"); th.textContent = h; htr.appendChild(th);
    });
    thead.appendChild(htr);
    const tbody = el("tbody");
    timeline.forEach((t, i) => {
      const c = STATUS_CFG[t.type] || STATUS_CFG["checked-in"];
      const tr = el("tr");
      const tdi = el("td"); tdi.style.cssText = "font-family:var(--mono);font-size:11px;color:var(--text-3);"; tdi.textContent = String(i+1);
      const tdt = el("td");
      const badge = span("tag"); badge.textContent = c.label; badge.style.cssText = `background:${c.bg};color:${c.color};`;
      tdt.appendChild(badge);
      const tds = el("td"); tds.style.fontFamily = "var(--mono)"; tds.style.fontSize = "12px"; tds.textContent = t.start;
      const tde = el("td"); tde.style.fontFamily = "var(--mono)"; tde.style.fontSize = "12px"; tde.style.color = "var(--text-2)"; tde.textContent = t.end || "ongoing";
      const tdd = el("td"); tdd.style.fontFamily = "var(--mono)"; tdd.style.fontSize = "12px"; tdd.textContent = t.duration !== null && t.duration !== undefined ? fmt(t.duration) : "—";
      tr.appendChild(tdi); tr.appendChild(tdt); tr.appendChild(tds); tr.appendChild(tde); tr.appendChild(tdd);
      tbody.appendChild(tr);
    });
    table.appendChild(thead); table.appendChild(tbody);
    sessCard.appendChild(table);
  }

  const clearBtn = mkBtn("btn-danger btn-sm", "Clear Today's Data", () => {
    if(confirm("Clear all session data for today?")) setState({status:"checked-out", timeline:[]});
  });
  clearBtn.style.marginTop = "14px";
  sessCard.appendChild(clearBtn);

  wrap.appendChild(statRow);
  wrap.appendChild(breakdownCard);
  wrap.appendChild(el("div", {style:{height:"16px"}}));
  wrap.appendChild(sessCard);
  return wrap;
}

// ── SETTINGS ────────────────────────────────────────
function SettingsView(){
  const u = APP.user;
  const wrap = div("fade-up");
  wrap.style.maxWidth = "600px";

  // Profile card
  const profileCard = div("card");
  profileCard.style.marginBottom = "16px";
  const pttl = div("sec-title"); pttl.style.marginBottom = "16px"; pttl.textContent = "Profile";
  profileCard.appendChild(pttl);

  const profileRow = div(); profileRow.style.cssText = "display:flex;align-items:center;gap:14px;margin-bottom:18px;";
  profileRow.appendChild(Avatar(u.avatar, "md"));
  const profileInfo = div();
  const pName = div(); pName.style.cssText = "font-weight:600;font-size:15px;"; pName.textContent = u.name;
  const pEmail = div(); pEmail.style.cssText = "font-size:12.5px;color:var(--text-2);"; pEmail.textContent = u.email;
  const pRole = span("tag"); pRole.textContent = u.role;
  pRole.style.cssText = "margin-top:5px;background:var(--indigo-lo);color:var(--indigo-hi);";
  profileInfo.appendChild(pName); profileInfo.appendChild(pEmail); profileInfo.appendChild(pRole);
  profileRow.appendChild(profileInfo);
  profileCard.appendChild(profileRow);

  // Name input
  const fName = div("field-grp");
  const lName = el("label", {class:"field-lbl"}); lName.textContent = "Display Name";
  const iName = el("input", {class:"input", value:u.name});
  fName.appendChild(lName); fName.appendChild(iName);

  // Email input
  const fEmail = div("field-grp");
  const lEmail = el("label", {class:"field-lbl"}); lEmail.textContent = "Email";
  const iEmail = el("input", {class:"input", type:"email", value:u.email});
  iEmail.disabled = true;
  iEmail.style.opacity = "0.5";
  fEmail.appendChild(lEmail); fEmail.appendChild(iEmail);

  const saveBtn = mkBtn("btn-primary btn-sm", "Save Changes", () => {
    const newName = iName.value.trim();
    if(newName && newName !== APP.user.name){
      APP.user.name = newName;
      APP.user.avatar = newName.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      saveUserState();
      render();
    }
  });

  [fName, fEmail, saveBtn].forEach(n => profileCard.appendChild(n));

  // Theme card
  const themeCard = div("card");
  themeCard.style.marginBottom = "16px";
  const tttl = div("sec-title"); tttl.style.marginBottom = "14px"; tttl.textContent = "Appearance";
  themeCard.appendChild(tttl);

  const themeRow = div(); themeRow.style.cssText = "display:flex;gap:9px;";
  ["dark","light"].forEach(t => {
    const b = mkBtn(`btn-sm ${APP.theme===t?"btn-primary":"btn-outline"}`, t==="dark"?"🌙 Dark":"☀️ Light", () => {
      document.body.setAttribute("data-theme", t);
      localStorage.setItem("nf-theme", t);
      setState({theme: t});
    });
    themeRow.appendChild(b);
  });
  themeCard.appendChild(themeRow);

  // Status reset card
  const resetCard = div("card");
  resetCard.style.marginBottom = "16px";
  const rttl = div("sec-title"); rttl.style.marginBottom = "8px"; rttl.textContent = "Session Management";
  const rsub = div(); rsub.style.cssText = "font-size:12.5px;color:var(--text-2);margin-bottom:14px;";
  rsub.textContent = "Reset your current session data. This cannot be undone.";
  const resetBtn = mkBtn("btn-danger btn-sm", "Reset Today's Sessions", () => {
    if(confirm("This will clear all your session data for today. Continue?")) setState({status:"checked-out", timeline:[]});
  });
  resetCard.appendChild(rttl); resetCard.appendChild(rsub); resetCard.appendChild(resetBtn);

  // Info card
  const infoCard = div("card");
  const ittl = div("sec-title"); ittl.style.marginBottom = "12px"; ittl.textContent = "Workspace Info";
  [
    ["Version",    "1.0.0"],
    ["Users",      String(USERS.length)],
    ["Your Role",  u.role],
    ["User ID",    `#${u.id}`],
  ].forEach(([k,v]) => {
    const row = div(); row.style.cssText = "display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;";
    const kEl = span(); kEl.style.color = "var(--text-2)"; kEl.textContent = k;
    const vEl = span(); vEl.style.fontFamily = "var(--mono)"; vEl.style.fontSize = "12px"; vEl.textContent = v;
    row.appendChild(kEl); row.appendChild(vEl);
    infoCard.appendChild(row);
  });
  infoCard.style.marginBottom = "16px";
  infoCard.insertBefore(ittl, infoCard.firstChild);

  [profileCard, themeCard, resetCard, infoCard].forEach(c => wrap.appendChild(c));
  return wrap;
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  document.body.setAttribute("data-theme", APP.theme);
  const root = document.getElementById("app");
  root.innerHTML = "";

  if(!APP.user){
    root.appendChild(AuthView());
    return;
  }

  const views = {
    dashboard: DashboardView,
    team:      TeamView,
    analytics: AnalyticsView,
    settings:  SettingsView,
  };
  const View = views[APP.page] || DashboardView;

  const app = div("app");
  app.appendChild(SidebarView());

  const mainEl = div("main");
  mainEl.appendChild(TopbarView());

  const content = div("content");
  content.appendChild(View());
  mainEl.appendChild(content);
  app.appendChild(mainEl);

  root.appendChild(app);
}

// ── Clock tick every 60s ──
setInterval(render, 60000);

// ── Responsive collapse ──
window.addEventListener("resize", () => {
  if(window.innerWidth < 960 && !APP.collapsed) setState({collapsed: true});
});

// ── Boot ──
render();
</script>
</body>
</html>
