<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaFlow Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif' font-weight='700'>N</text></svg>" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-app: #0b0d14;
            --bg-card: #111520;
            --bg-card2: #181d2c;
            --bg-glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --border-hi: rgba(99, 102, 241, 0.5);
            --text-1: #eef2ff;
            --text-2: #7c8898;
            --text-3: #3d4659;
            --indigo: #6366f1;
            --indigo-hi: #a5b4fc;
            --indigo-lo: rgba(99, 102, 241, 0.14);
            --emerald: #10b981;
            --amber: #f59e0b;
            --sky: #0ea5e9;
            --violet: #8b5cf6;
            --rose: #f43f5e;
            --font: 'DM Sans', system-ui, sans-serif;
            --mono: 'DM Mono', monospace;
            --r1: 7px;
            --r2: 13px;
            --trans: 0.17s cubic-bezier(.4, 0, .2, 1);
            --sidebar-w: 215px;
        }

        [data-theme="light"] {
            --bg-app: #f0f4ff;
            --bg-card: #ffffff;
            --bg-card2: #f6f8ff;
            --bg-glass: rgba(0, 0, 0, 0.025);
            --border: rgba(0, 0, 0, 0.09);
            --border-hi: rgba(99, 102, 241, 0.4);
            --text-1: #0f172a;
            --text-2: #475569;
            --text-3: #94a3b8;
            --indigo-lo: rgba(99, 102, 241, 0.09);
        }

        html,
        body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-app);
            color: var(--text-1);
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width var(--trans);
            overflow: hidden;
        }

        .sidebar.collapsed {
            width: 58px;
        }

        .sb-logo {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 19px 15px;
            border-bottom: 1px solid var(--border);
            min-height: 64px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.5px;
        }

        .logo-text {
            overflow: hidden;
            white-space: nowrap;
            transition: opacity var(--trans);
        }

        .logo-name {
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text-1);
        }

        .logo-sub {
            font-size: 10px;
            color: var(--text-2);
        }

        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .nav-lbl,
        .sidebar.collapsed .user-info {
            opacity: 0;
            width: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .sb-nav {
            flex: 1;
            overflow-y: auto;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--r1);
            cursor: pointer;
            color: var(--text-2);
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: var(--font);
            transition: background var(--trans), color var(--trans);
        }

        .nav-item:hover {
            background: var(--bg-glass);
            color: var(--text-1);
        }

        .nav-item.active {
            background: var(--indigo-lo);
            color: var(--indigo-hi);
        }

        .nav-icon {
            font-size: 16px;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
            line-height: 1;
        }

        .sb-bottom {
            padding: 10px 8px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 9px 10px;
            border-radius: var(--r1);
        }

        .avatar {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            font-weight: 600;
            flex-shrink: 0;
        }

        .av-sm {
            width: 28px;
            height: 28px;
            font-size: 11px;
        }

        .av-md {
            width: 38px;
            height: 38px;
            font-size: 14px;
        }

        .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-1);
            white-space: nowrap;
        }

        .user-role-lbl {
            font-size: 10.5px;
            color: var(--text-2);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .topbar {
            height: 64px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .tb-title {
            font-size: 16px;
            font-weight: 600;
        }

        .tb-sub {
            font-size: 11px;
            color: var(--text-2);
            margin-top: 1px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--r1);
            border: 1px solid var(--border);
            background: var(--bg-card2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            font-size: 16px;
            transition: all var(--trans);
            font-family: var(--font);
            position: relative;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            color: var(--text-1);
            border-color: var(--border-hi);
            background: var(--indigo-lo);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 20px;
        }

        .card-sm {
            padding: 16px;
        }

        .card-lbl {
            font-size: 12px;
            color: var(--text-2);
            font-weight: 500;
            margin-bottom: 5px;
        }

        .card-val {
            font-size: 26px;
            font-weight: 600;
            line-height: 1.1;
        }

        .card-sub {
            font-size: 11.5px;
            color: var(--text-2);
            margin-top: 4px;
        }

        /* GRIDS */
        .grid4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .grid3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }

        .grid-main {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 18px;
        }

        .col-stack {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* BADGES */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 11px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 10.5px;
            font-weight: 500;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            border-radius: var(--r1);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--trans);
            border: none;
            font-family: var(--font);
        }

        .btn-primary {
            background: #6366f1;
            color: #fff;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            color: var(--text-1);
            border-color: var(--border-hi);
            background: var(--indigo-lo);
        }

        .btn-danger {
            background: rgba(244, 63, 94, .12);
            color: #fb7185;
            border: 1px solid rgba(244, 63, 94, .25);
        }

        .btn-danger:hover {
            background: rgba(244, 63, 94, .2);
        }

        .btn-success {
            background: rgba(16, 185, 129, .12);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, .25);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, .2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12.5px;
        }

        .btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            pointer-events: none;
        }

        .sa-row {
            display: flex;
            flex-wrap: wrap;
            gap: 9px;
        }

        /* SECTION */
        .sec-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .sec-title {
            font-size: 13.5px;
            font-weight: 600;
        }

        /* TIMELINE */
        .tl {
            display: flex;
            flex-direction: column;
        }

        .tl-item {
            display: flex;
            gap: 12px;
            padding: 9px 0;
            position: relative;
        }

        .tl-item:not(:last-child)::before {
            content: '';
            position: absolute;
            left: 16px;
            top: 34px;
            width: 1px;
            height: calc(100% - 12px);
            background: var(--border);
        }

        .tl-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            border: 2px solid;
        }

        /* DONUT */
        .donut-wrap {
            display: flex;
            justify-content: center;
            margin: 12px 0;
        }

        /* QUICK LINKS */
        .ql-item {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px 13px;
            border-radius: var(--r1);
            border: 1px solid var(--border);
            background: var(--bg-card2);
            cursor: pointer;
            transition: all var(--trans);
            text-decoration: none;
            color: var(--text-1);
            margin-bottom: 8px;
        }

        .ql-item:hover {
            border-color: var(--border-hi);
            background: var(--indigo-lo);
        }

        .ql-icon {
            width: 34px;
            height: 34px;
            border-radius: var(--r1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
        }

        /* PROGRESS */
        .prog {
            height: 5px;
            border-radius: 100px;
            background: var(--border);
            overflow: hidden;
            margin-top: 4px;
        }

        .prog-fill {
            height: 100%;
            border-radius: 100px;
            transition: width .7s cubic-bezier(.4, 0, .2, 1);
        }

        /* TABLES */
        .tbl {
            width: 100%;
            border-collapse: collapse;
        }

        .tbl th {
            font-size: 11px;
            color: var(--text-2);
            font-weight: 500;
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        .tbl td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .tbl tr:last-child td {
            border-bottom: none;
        }

        /* FORM */
        .input {
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: var(--r1);
            padding: 9px 13px;
            font-size: 13.5px;
            color: var(--text-1);
            font-family: var(--font);
            width: 100%;
            outline: none;
            transition: border var(--trans);
        }

        .input:focus {
            border-color: #6366f1;
        }

        .input::placeholder {
            color: var(--text-3);
        }

        .field-lbl {
            font-size: 12px;
            color: var(--text-2);
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .field-grp {
            margin-bottom: 15px;
        }

        /* PIE LEGEND */
        .pie-row {
            display: flex;
            align-items: center;
            margin-bottom: 9px;
            font-size: 12.5px;
        }

        .pie-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .pie-name {
            color: var(--text-2);
            flex: 1;
        }

        .pie-val {
            font-weight: 500;
            font-family: var(--mono);
            font-size: 12px;
        }

        /* AUTH */
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-app);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 32px;
        }

        .err-msg {
            font-size: 12px;
            color: #fb7185;
            margin-top: 8px;
            min-height: 18px;
        }

        .success-msg {
            font-size: 12px;
            color: #34d399;
            margin-top: 8px;
        }

        /* SPINNER */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--indigo);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* LOADING SCREEN */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 14px;
            background: var(--bg-app);
        }

        .loading-screen .spinner {
            width: 32px;
            height: 32px;
            border-width: 3px;
        }

        /* ANIMATIONS */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .35;
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp .3s ease both;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* RESPONSIVE */
        @media(max-width:960px) {
            .grid4 {
                grid-template-columns: repeat(2, 1fr);
            }

            .grid3 {
                grid-template-columns: 1fr 1fr;
            }

            .grid-main {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 58px;
            }

            .sidebar .logo-text,
            .sidebar .nav-lbl,
            .sidebar .user-info {
                opacity: 0;
                width: 0;
                pointer-events: none;
            }
        }

        @media(max-width:600px) {
            .content {
                padding: 14px;
            }

            .grid4 {
                grid-template-columns: 1fr 1fr;
            }

            .topbar {
                padding: 0 14px;
                gap: 8px;
            }
        }

        /* CONFIG MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r2);
            padding: 28px;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .modal-sub {
            font-size: 13px;
            color: var(--text-2);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--indigo);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .sql-block {
            background: var(--bg-card2);
            border: 1px solid var(--border);
            border-radius: var(--r1);
            padding: 12px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--indigo-hi);
            white-space: pre;
            overflow-x: auto;
            margin-top: 6px;
            line-height: 1.6;
        }

        .copy-btn {
            font-size: 11px;
            padding: 4px 10px;
            margin-top: 6px;
        }

        /* SAVED INDICATOR */
        .saved-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            background: rgba(16, 185, 129, .1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, .2);
            opacity: 0;
            transition: opacity .3s;
        }

        .saved-pill.show {
            opacity: 1;
        }

        /* SETUP BANNER — shown before Supabase is configured */
        .setup-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg-app);
        }
    </style>
</head>

<body data-theme="dark">
    <div id="app">
        <!-- Fallback visible immediately before JS runs -->
        <div class="loading-screen">
            <div class="spinner"></div>
            <div style="color:var(--text-2);font-size:13px;">Starting NexaFlow…</div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // SUPABASE CONFIG
        // ═══════════════════════════════════════════════════════════════
        let SUPABASE_URL = localStorage.getItem("nf_sb_url") || "";
        let SUPABASE_KEY = localStorage.getItem("nf_sb_key") || "";
        let supabase = null;

        function initSupabase() {
            if (!SUPABASE_URL || !SUPABASE_KEY) return false;
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
                });
                return true;
            } catch (e) { console.error("Supabase init error:", e); return false; }
        }

        // ═══════════════════════════════════════════════════════════════
        // CONSTANTS
        // ═══════════════════════════════════════════════════════════════
        const STATUS_CFG = {
            "checked-in": { label: "Checked In", color: "#10b981", bg: "rgba(16,185,129,.14)", icon: "●" },
            "checked-out": { label: "Checked Out", color: "#64748b", bg: "rgba(100,116,139,.12)", icon: "○" },
            "break": { label: "On Break", color: "#f59e0b", bg: "rgba(245,158,11,.14)", icon: "◐" },
            "meeting": { label: "In Meeting", color: "#0ea5e9", bg: "rgba(14,165,233,.14)", icon: "◈" },
            "call": { label: "On a Call", color: "#8b5cf6", bg: "rgba(139,92,246,.14)", icon: "◉" },
            "focus": { label: "Focus Mode", color: "#d946ef", bg: "rgba(217,70,239,.14)", icon: "◎" },
        };

        const QUICK_LINKS = [
            { icon: "💬", label: "WhatsApp Web", sub: "Open messaging", href: "https://web.whatsapp.com", bg: "rgba(37,211,102,.12)" },
            { icon: "🧩", label: "Zoho CRM", sub: "Customer portal", href: "https://crm.zoho.com", bg: "rgba(99,102,241,.12)" },
            { icon: "📅", label: "Google Calendar", sub: "View schedule", href: "https://calendar.google.com", bg: "rgba(234,67,53,.12)" },
            { icon: "📊", label: "Google Sheets", sub: "Spreadsheets", href: "https://sheets.google.com", bg: "rgba(14,165,233,.12)" },
            { icon: "🗂️", label: "Notion", sub: "Docs & tasks", href: "https://notion.so", bg: "rgba(255,255,255,.08)" },
            { icon: "📧", label: "Gmail", sub: "Check inbox", href: "https://mail.google.com", bg: "rgba(234,67,53,.08)" },
        ];

        // ═══════════════════════════════════════════════════════════════
        // DOM HELPERS
        // ═══════════════════════════════════════════════════════════════
        function el(tag, attrs, ...kids) {
            const e = document.createElement(tag);
            if (attrs && typeof attrs === "object") {
                for (const [k, v] of Object.entries(attrs)) {
                    if (v === null || v === false || v === undefined) continue;
                    if (k === "class") { e.className = v; }
                    else if (k === "style" && typeof v === "object") { Object.assign(e.style, v); }
                    else if (k === "on" && typeof v === "object") { for (const [ev, fn] of Object.entries(v)) e.addEventListener(ev, fn); }
                    else { try { e.setAttribute(k, v); } catch (err) { } }
                }
            }
            function addKid(k) {
                if (k == null || k === false || k === undefined) return;
                if (Array.isArray(k)) { k.forEach(addKid); return; }
                if (k instanceof Node) e.appendChild(k);
                else e.appendChild(document.createTextNode(String(k)));
            }
            kids.forEach(addKid);
            return e;
        }
        function div(cls, ...kids) {
            if (cls && typeof cls === "object" && !(cls instanceof Node)) return el("div", cls, ...kids);
            return el("div", cls ? { class: cls } : null, ...kids);
        }
        function span(cls, ...kids) { return el("span", cls ? { class: cls } : null, ...kids); }
        function mkBtn(cls, label, onClick, disabled) {
            const b = el("button", { class: `btn ${cls}`, ...(disabled ? { disabled: true } : {}) });
            b.textContent = label;
            if (onClick) b.addEventListener("click", onClick);
            return b;
        }
        function Avatar(initials, size = "sm") {
            return div(`avatar av-${size}`, initials || "?");
        }
        function StatusBadge(status) {
            const c = STATUS_CFG[status] || STATUS_CFG["checked-out"];
            const badge = div("badge");
            badge.style.background = c.bg;
            badge.style.color = c.color;
            const dot = span(); dot.textContent = c.icon;
            if (status !== "checked-out") dot.classList.add("pulse");
            badge.appendChild(dot);
            badge.appendChild(document.createTextNode(" " + c.label));
            return badge;
        }

        // ═══════════════════════════════════════════════════════════════
        // TIME HELPERS
        // ═══════════════════════════════════════════════════════════════
        function nowISO() { return new Date().toISOString(); }
        function nowDateStr() { return new Date().toISOString().slice(0, 10); }
        function fmt(min) {
            if (min == null || isNaN(min) || min <= 0) return "0m";
            const h = Math.floor(min / 60), m = Math.round(min % 60);
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }
        function minutesBetween(start_iso, end_iso) {
            if (!start_iso) return 0;
            const end = end_iso ? new Date(end_iso) : new Date();
            return Math.max(0, Math.round((end - new Date(start_iso)) / 60000));
        }
        function fmtTime(iso) {
            if (!iso) return "—";
            return new Date(iso).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: true });
        }
        function nowFull() {
            return new Date().toLocaleDateString("en-IN", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
        }
        function now5() {
            return new Date().toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit", hour12: false });
        }

        // ═══════════════════════════════════════════════════════════════
        // DATABASE LAYER
        // ═══════════════════════════════════════════════════════════════
        async function loadTodayTimeline() {
            if (!supabase || !APP.profile) return;
            const today = nowDateStr();
            const { data, error } = await supabase
                .from("sessions").select("*")
                .eq("user_id", APP.profile.id).eq("work_date", today)
                .order("started_at", { ascending: true });
            if (error) { console.error("loadTodayTimeline:", error); return; }
            APP.timeline = data || [];
            APP.currentSession = APP.timeline.find(s => !s.ended_at) || null;
            APP.status = APP.currentSession ? APP.currentSession.type : "checked-out";
        }

        async function loadDateTimeline(date, userId) {
            if (!supabase) return [];
            const { data, error } = await supabase.from("sessions").select("*")
                .eq("user_id", userId || APP.profile.id).eq("work_date", date)
                .order("started_at", { ascending: true });
            if (error) { console.error(error); return []; }
            return data || [];
        }

        async function loadRangeSessions(userId, fromDate, toDate) {
            if (!supabase) return [];
            const { data, error } = await supabase.from("sessions").select("*")
                .eq("user_id", userId).gte("work_date", fromDate).lte("work_date", toDate)
                .order("started_at", { ascending: true });
            if (error) { console.error(error); return []; }
            return data || [];
        }

        async function startSession(type) {
            if (!supabase || !APP.profile) return null;
            const { data, error } = await supabase.from("sessions").insert({
                user_id: APP.profile.id, type, work_date: nowDateStr(),
                started_at: nowISO(), ended_at: null, duration_minutes: null,
            }).select().single();
            if (error) { console.error("startSession:", error); return null; }
            return data;
        }

        async function endSession(session) {
            if (!supabase || !session) return;
            const endTime = nowISO();
            const dur = minutesBetween(session.started_at, endTime);
            const { error } = await supabase.from("sessions").update({
                ended_at: endTime, duration_minutes: dur,
            }).eq("id", session.id);
            if (error) console.error("endSession:", error);
        }

        async function loadTeamStatus() {
            if (!supabase) return [];
            const { data: profiles, error } = await supabase.from("profiles").select("*");
            if (error) { console.error(error); return []; }
            const today = nowDateStr();
            const result = [];
            for (const p of profiles) {
                const { data: sessions } = await supabase.from("sessions").select("*")
                    .eq("user_id", p.id).eq("work_date", today).order("started_at", { ascending: true });
                const tl = sessions || [];
                const open = tl.find(s => !s.ended_at);
                const workMin = tl.filter(s => s.ended_at && s.type === "checked-in")
                    .reduce((a, s) => a + (s.duration_minutes || 0), 0)
                    + (open && open.type === "checked-in" ? minutesBetween(open.started_at) : 0);
                result.push({
                    id: p.id, name: p.full_name, avatar: p.avatar_initials, role: p.role,
                    status: open ? open.type : "checked-out", workMin, sessions: tl.length
                });
            }
            return result;
        }

        // ═══════════════════════════════════════════════════════════════
        // STATUS CHANGE
        // ═══════════════════════════════════════════════════════════════
        async function changeStatus(newStatus) {
            if (APP.saving) return;
            APP.saving = true;
            render();
            if (APP.currentSession) await endSession(APP.currentSession);
            if (newStatus !== "checked-out") await startSession(newStatus);
            await loadTodayTimeline();
            APP.saving = false;
            render();
        }

        // ═══════════════════════════════════════════════════════════════
        // AUTH
        // ═══════════════════════════════════════════════════════════════
        async function signIn(email, password) {
            if (!supabase) return { error: { message: "Supabase not configured. Click 'Configure database' below." } };
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) return { error };
            return { user: data.user };
        }

        async function signOut() {
            if (!supabase) return;
            if (APP.currentSession) await endSession(APP.currentSession);
            await supabase.auth.signOut();
            APP.authUser = null; APP.profile = null; APP.status = "checked-out";
            APP.timeline = []; APP.currentSession = null; APP.page = "dashboard";
            render();
        }

        async function loadProfile(userId) {
            if (!supabase) return null;
            const { data, error } = await supabase.from("profiles").select("*").eq("id", userId).single();
            if (error) { console.error("loadProfile:", error); return null; }
            return data;
        }

        // ═══════════════════════════════════════════════════════════════
        // BOOT — FIX: always sets APP.ready = true so render() works
        // ═══════════════════════════════════════════════════════════════
        async function boot() {
            document.body.setAttribute("data-theme", APP.theme);

            // If no Supabase keys → go straight to setup screen
            if (!SUPABASE_URL || !SUPABASE_KEY) {
                APP.ready = true;
                APP.showSetup = true;
                render();
                return;
            }

            // Try to init Supabase
            const ok = initSupabase();
            if (!ok) {
                APP.ready = true;
                APP.showSetup = true;
                render();
                return;
            }

            // Check for existing session
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) {
                    APP.authUser = session.user;
                    APP.profile = await loadProfile(session.user.id);
                    if (APP.profile) await loadTodayTimeline();
                }
            } catch (e) {
                console.error("getSession error:", e);
            }

            APP.ready = true;
            render();

            // Auth state listener
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === "SIGNED_IN" && session?.user) {
                    APP.authUser = session.user;
                    APP.profile = await loadProfile(session.user.id);
                    if (APP.profile) await loadTodayTimeline();
                    render();
                } else if (event === "SIGNED_OUT") {
                    APP.authUser = null; APP.profile = null;
                    APP.status = "checked-out"; APP.timeline = []; APP.currentSession = null;
                    render();
                }
            });
        }

-- Profiles table
create table profiles (
  id uuid references auth.users primary key,
  full_name text not null,
  avatar_initials text default 'U',
  role text default 'Staff',
  created_at timestamptz default now()
);
alter table profiles enable row level security;
create policy "Users can read all profiles"
  on profiles for select using (auth.role() = 'authenticated');
create policy "Users can update own profile"
  on profiles for update using (auth.uid() = id);
create policy "Users can insert own profile"
  on profiles for insert with check (auth.uid() = id);

-- Sessions table
create table sessions (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references profiles(id) not null,
  type text not null,
  work_date date not null,
  started_at timestamptz not null,
  ended_at timestamptz,
  duration_minutes integer,
  created_at timestamptz default now()
);
alter table sessions enable row level security;
create policy "Users can read all sessions"
  on sessions for select using (auth.role() = 'authenticated');
create policy "Users can insert own sessions"
  on sessions for insert with check (auth.uid() = user_id);
create policy "Users can update own sessions"

create policy "Users can delete own sessions"

        // ═══════════════════════════════════════════════════════════════
        // COMPUTE TOTALS
        // ═══════════════════════════════════════════════════════════════
        function computeTotals(sessions) {
            let work = 0, brk = 0, meet = 0, call = 0, focus = 0;
            sessions.filter(s => s.ended_at).forEach(s => {
                const d = s.duration_minutes || 0;
                if (s.type === "checked-in") work += d;
                if (s.type === "break") brk += d;
                if (s.type === "meeting") meet += d;
                if (s.type === "call") call += d;
                if (s.type === "focus") focus += d;
            });
            const open = sessions.find(s => !s.ended_at);
            if (open) {
                const cur = minutesBetween(open.started_at);
                if (open.type === "checked-in") work += cur;
                if (open.type === "break") brk += cur;
                if (open.type === "meeting") meet += cur;
                if (open.type === "call") call += cur;
                if (open.type === "focus") focus += cur;
            }
            return { work, brk, meet, call, focus, total: work + brk + meet + call + focus };
        }

        function DonutChart(segments) {
            const r = 40, cx = 50, cy = 50, sw = 14, circ = 2 * Math.PI * r;
            const total = segments.reduce((a, s) => a + s.v, 0) || 1;
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.setAttribute("width", "110"); svg.setAttribute("height", "110");

            const bg = document.createElementNS(svgNS, "circle");
            bg.setAttribute("cx", cx); bg.setAttribute("cy", cy); bg.setAttribute("r", r);
            bg.setAttribute("fill", "none"); bg.setAttribute("stroke", "var(--border)"); bg.setAttribute("stroke-width", sw);
            svg.appendChild(bg);

            const inner = document.createElementNS(svgNS, "circle");
            inner.setAttribute("cx", cx); inner.setAttribute("cy", cy); inner.setAttribute("r", r - sw / 2 - 3);
            inner.setAttribute("fill", "var(--bg-card2)");
            svg.appendChild(inner);

            let offset = 0;
            segments.forEach(s => {
                if (s.v <= 0) return;
                const dash = (s.v / total) * circ;
                const c = document.createElementNS(svgNS, "circle");
                c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", r);
                c.setAttribute("fill", "none"); c.setAttribute("stroke", s.color); c.setAttribute("stroke-width", sw);
                c.setAttribute("stroke-dasharray", `${dash} ${circ - dash}`);
                c.setAttribute("stroke-dashoffset", `${circ * 0.25 - offset}`);
                c.setAttribute("stroke-linecap", "round");
                svg.appendChild(c);
                offset += dash;
            });
            return svg;
        }

            c.appendChild(lbl); c.appendChild(val);
            if (sub) { const s = div("card-sub"); s.textContent = sub; c.appendChild(s); }
            return c;
        }

                StatCard("In Session", String(sessionCount), "Break or meeting"),
                StatCard("Away", String(awayCount), "Checked out")
                ].forEach(c => sr.appendChild(c));

                const tableCard = div("card");
                const tHdr = div("sec-hdr");
                const tTtl = div("sec-title"); tTtl.textContent = "Live Team Status";
                const tSub = span(); tSub.style.cssText = "font-size:11px;color:var(--text-2);"; tSub.textContent = "Real-time from database";
                tHdr.appendChild(tTtl); tHdr.appendChild(tSub); tableCard.appendChild(tHdr);

                const table = el("table", { class: "tbl" });
                const thead = el("thead"); const htr = el("tr");
                ["Member", "Role", "Status", "Today's Work", "Sessions"].forEach(h => { const th = el("th"); th.textContent = h; htr.appendChild(th); });
                thead.appendChild(htr);
                const tbody = el("tbody");
                team.forEach(m => {
                    const tr = el("tr");
                    const tdN = el("td"); const nameRow = div(); nameRow.style.cssText = "display:flex;align-items:center;gap:9px;";
                    nameRow.appendChild(Avatar(m.avatar, "sm")); const ns = span(); ns.textContent = m.name; nameRow.appendChild(ns); tdN.appendChild(nameRow);
                    const tdR = el("td"); const rt = span("tag"); rt.textContent = m.role;
                    rt.style.cssText = m.role === "Admin" ? "background:var(--indigo-lo);color:var(--indigo-hi);" : "background:rgba(16,185,129,.1);color:#34d399;";
                    tdR.appendChild(rt);
                    const tdS = el("td"); tdS.appendChild(StatusBadge(m.status));
                    const tdW = el("td"); tdW.style.cssText = "font-family:var(--mono);font-size:12px;"; tdW.textContent = fmt(m.workMin);
                    const tdSe = el("td"); tdSe.style.cssText = "font-family:var(--mono);font-size:12px;color:var(--text-2);"; tdSe.textContent = String(m.sessions);
                    tr.appendChild(tdN); tr.appendChild(tdR); tr.appendChild(tdS); tr.appendChild(tdW); tr.appendChild(tdSe); tbody.appendChild(tr);
                });
                table.appendChild(thead); table.appendChild(tbody); tableCard.appendChild(table);

                const refreshBtn = mkBtn("btn-outline btn-sm", "↺ Refresh", () => { wrap.innerHTML = ""; wrap.appendChild(loading.cloneNode(true)); });
                refreshBtn.style.marginTop = "14px"; tableCard.appendChild(refreshBtn);
                wrap.appendChild(sr); wrap.appendChild(tableCard);
            })();
            return wrap;
        }

        // ═══════════════════════════════════════════════════════════════
        // SETTINGS VIEW
        // ═══════════════════════════════════════════════════════════════
        function SettingsView() {
            const u = APP.profile;
            const wrap = div("fade-up"); wrap.style.maxWidth = "600px";

            const profileCard = div("card"); profileCard.style.marginBottom = "16px";
            const pttl = div("sec-title"); pttl.style.marginBottom = "16px"; pttl.textContent = "Profile"; profileCard.appendChild(pttl);
            const pRow = div(); pRow.style.cssText = "display:flex;align-items:center;gap:14px;margin-bottom:18px;";
            pRow.appendChild(Avatar(u?.avatar_initials || "?", "md"));
            const pInfo = div();
            const pN = div(); pN.style.cssText = "font-weight:600;font-size:15px;"; pN.textContent = u?.full_name || "";
            const pE = div(); pE.style.cssText = "font-size:12.5px;color:var(--text-2);"; pE.textContent = APP.authUser?.email || "";
            const pR = span("tag"); pR.textContent = u?.role || "Staff"; pR.style.cssText = "margin-top:5px;background:var(--indigo-lo);color:var(--indigo-hi);display:inline-flex;";
            pInfo.appendChild(pN); pInfo.appendChild(pE); pInfo.appendChild(pR);
            pRow.appendChild(pInfo); profileCard.appendChild(pRow);

            const fName = div("field-grp");
            const lName = el("label", { class: "field-lbl" }); lName.textContent = "Display Name";
            const iName = el("input", { class: "input", value: u?.full_name || "" });
            fName.appendChild(lName); fName.appendChild(iName);

            const saved = span("saved-pill"); saved.textContent = "✓ Saved"; saved.style.marginLeft = "8px";
            const saveBtnRow = div(); saveBtnRow.style.cssText = "display:flex;align-items:center;";
            const saveBtn = mkBtn("btn-primary btn-sm", "Save Changes", async () => {
                const newName = iName.value.trim();
                if (!newName || !supabase) return;
                const initials = newName.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
                await supabase.from("profiles").update({ full_name: newName, avatar_initials: initials }).eq("id", APP.profile.id);
                APP.profile.full_name = newName; APP.profile.avatar_initials = initials;
                saved.classList.add("show"); setTimeout(() => saved.classList.remove("show"), 2500);
            });
            saveBtnRow.appendChild(saveBtn); saveBtnRow.appendChild(saved);
            profileCard.appendChild(fName); profileCard.appendChild(saveBtnRow);

            const themeCard = div("card"); themeCard.style.marginBottom = "16px";
            const tttl = div("sec-title"); tttl.style.marginBottom = "14px"; tttl.textContent = "Appearance"; themeCard.appendChild(tttl);
            const themeRow = div(); themeRow.style.cssText = "display:flex;gap:9px;";
            ["dark", "light"].forEach(t => {
                const b = mkBtn(`btn-sm ${APP.theme === t ? "btn-primary" : "btn-outline"}`, t === "dark" ? "🌙 Dark" : "☀️ Light", () => {
                    document.body.setAttribute("data-theme", t); localStorage.setItem("nf_theme", t); APP.theme = t; render();
                });
                themeRow.appendChild(b);
            });
            themeCard.appendChild(themeRow);

            const dbCard = div("card"); dbCard.style.marginBottom = "16px";
            const dbTtl = div("sec-title"); dbTtl.style.marginBottom = "8px"; dbTtl.textContent = "Database Connection";
            const dbSub = div(); dbSub.style.cssText = "font-size:12.5px;color:var(--text-2);margin-bottom:12px;";
            dbSub.textContent = "Supabase project connected. Change keys if needed.";
            const dbBtn = mkBtn("btn-outline btn-sm", "⚙ Reconfigure Database", () => { APP.showSetup = true; render(); });
            dbCard.appendChild(dbTtl); dbCard.appendChild(dbSub); dbCard.appendChild(dbBtn);

            const resetCard = div("card"); resetCard.style.marginBottom = "16px";
            const rttl = div("sec-title"); rttl.style.marginBottom = "8px"; rttl.textContent = "Session Management";
            const rsub = div(); rsub.style.cssText = "font-size:12.5px;color:var(--text-2);margin-bottom:14px;";
            rsub.textContent = "Manually check out and clear today's open session.";
            const resetBtn = mkBtn("btn-danger btn-sm", "Force Check Out", async () => {
                if (!confirm("This will end your current session and check you out. Continue?")) return;
                await changeStatus("checked-out");
            });
            resetCard.appendChild(rttl); resetCard.appendChild(rsub); resetCard.appendChild(resetBtn);

            const infoCard = div("card");
            const ittl = div("sec-title"); ittl.style.marginBottom = "12px"; ittl.textContent = "Workspace Info"; infoCard.appendChild(ittl);
            [["Version", "2.0.1 (fixed)"], ["Your Role", u?.role || "—"], ["User ID", APP.authUser?.id?.slice(0, 8) + "…" || "—"], ["DB Status", supabase ? "✓ Connected" : "✗ Not configured"]].forEach(([k, v]) => {
                const row = div(); row.style.cssText = "display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;";
                const kEl = span(); kEl.style.color = "var(--text-2)"; kEl.textContent = k;
                const vEl = span(); vEl.style.cssText = "font-family:var(--mono);font-size:12px;"; vEl.textContent = v;
                row.appendChild(kEl); row.appendChild(vEl); infoCard.appendChild(row);
            });

            [profileCard, themeCard, dbCard, resetCard, infoCard].forEach(c => wrap.appendChild(c));
            return wrap;
        }

        // ═══════════════════════════════════════════════════════════════
        // RENDER — FIX: no guard on APP.ready blocking setup modal
        // ═══════════════════════════════════════════════════════════════
        function render() {
            document.body.setAttribute("data-theme", APP.theme);
            const root = document.getElementById("app");
            root.innerHTML = "";

            // Always show setup modal if requested (even before auth)
            if (APP.showSetup) {
                const canClose = !!APP.authUser; // can only close if logged in
                root.appendChild(SetupModal(canClose));
                return;
            }

            // Not ready yet (booting) — show spinner
            if (!APP.ready) {
                const ls = div("loading-screen");
                ls.appendChild(div("spinner"));
                const t = div(); t.style.cssText = "color:var(--text-2);font-size:13px;"; t.textContent = "Connecting…";
                ls.appendChild(t); root.appendChild(ls); return;
            }

            // No auth user → show login
            if (!APP.authUser || !APP.profile) {
                root.appendChild(AuthView()); return;
            }

            // Main app
            const views = { dashboard: DashboardView, analytics: AnalyticsView, history: HistoryView, team: TeamView, settings: SettingsView };
            const View = views[APP.page] || DashboardView;
            const appEl = div("app");
            appEl.appendChild(SidebarView());
            const mainEl = div("main");
            mainEl.appendChild(TopbarView());
            const content = div("content");
            content.appendChild(View());
            mainEl.appendChild(content);
            appEl.appendChild(mainEl);
            root.appendChild(appEl);
        }

        // ═══════════════════════════════════════════════════════════════
        // LIVE CLOCK — lightweight, no full re-render
        // ═══════════════════════════════════════════════════════════════
        setInterval(() => {
            const clk = document.getElementById("live-clock");
            if (clk) clk.textContent = now5();
        }, 30000);

        // ═══════════════════════════════════════════════════════════════
        // RESPONSIVE
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener("resize", () => {
            if (window.innerWidth < 960 && !APP.collapsed) { APP.collapsed = true; render(); }
        });

        // ═══════════════════════════════════════════════════════════════
        // START
        // ═══════════════════════════════════════════════════════════════
        boot();
    </script>
</body>

</html>
