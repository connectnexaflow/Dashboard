<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexaFlow Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-app:#0b0d14;--bg-card:#111520;--bg-card2:#181d2c;--bg-glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);--border-hi:rgba(99,102,241,0.5);
  --text-1:#eef2ff;--text-2:#7c8898;--text-3:#3d4659;
  --indigo:#6366f1;--indigo-hi:#a5b4fc;--indigo-lo:rgba(99,102,241,0.14);
  --emerald:rgba(16,185,129,1);--amber:rgba(245,158,11,1);
  --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
  --r1:7px;--r2:13px;--trans:0.17s cubic-bezier(.4,0,.2,1);--sidebar-w:215px;
}
[data-theme="light"]{
  --bg-app:#f0f4ff;--bg-card:#ffffff;--bg-card2:#f6f8ff;
  --bg-glass:rgba(0,0,0,0.025);--border:rgba(0,0,0,0.09);
  --border-hi:rgba(99,102,241,0.4);--text-1:#0f172a;--text-2:#475569;
  --text-3:#94a3b8;--indigo-lo:rgba(99,102,241,0.09);
}
html,body{height:100%;font-family:var(--font);background:var(--bg-app);color:var(--text-1);}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width var(--trans);overflow:hidden;}
.sidebar.collapsed{width:58px;}
.sb-logo{display:flex;align-items:center;gap:11px;padding:19px 15px;border-bottom:1px solid var(--border);min-height:64px;}
.logo-mark{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;overflow:hidden;background:transparent;}
.logo-mark img{width:32px;height:32px;object-fit:cover;border-radius:9px;display:block;}
.logo-text{overflow:hidden;white-space:nowrap;transition:opacity var(--trans);}
.logo-name{font-size:14.5px;font-weight:600;color:var(--text-1);}
.logo-sub{font-size:10px;color:var(--text-2);}
.sidebar.collapsed .logo-text,.sidebar.collapsed .nav-lbl,.sidebar.collapsed .user-info{opacity:0;width:0;pointer-events:none;overflow:hidden;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r1);cursor:pointer;color:var(--text-2);font-size:13.5px;font-weight:500;white-space:nowrap;border:none;background:none;width:100%;text-align:left;font-family:var(--font);transition:background var(--trans),color var(--trans);}
.nav-item:hover{background:var(--bg-glass);color:var(--text-1);}
.nav-item.active{background:var(--indigo-lo);color:var(--indigo-hi);}
.nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.user-chip{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r1);}
.avatar{display:flex;align-items:center;justify-content:center;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:600;flex-shrink:0;}
.av-sm{width:28px;height:28px;font-size:11px;}.av-md{width:38px;height:38px;font-size:14px;}
.user-name{font-size:13px;font-weight:500;color:var(--text-1);white-space:nowrap;}
.user-role-lbl{font-size:10.5px;color:var(--text-2);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:64px;border-bottom:1px solid var(--border);background:var(--bg-card);display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;}
.tb-title{font-size:16px;font-weight:600;}.tb-sub{font-size:11px;color:var(--text-2);margin-top:1px;}
.icon-btn{width:36px;height:36px;border-radius:var(--r1);border:1px solid var(--border);background:var(--bg-card2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:16px;transition:all var(--trans);font-family:var(--font);flex-shrink:0;position:relative;}
.icon-btn:hover{color:var(--text-1);border-color:var(--border-hi);background:var(--indigo-lo);}
.content{flex:1;overflow-y:auto;padding:24px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;overflow:hidden;}
.card-sm{padding:16px;}.card-lbl{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:5px;}
.card-val{font-size:26px;font-weight:600;line-height:1.1;}.card-sub{font-size:11.5px;color:var(--text-2);margin-top:4px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.grid-main{display:grid;grid-template-columns:1fr 300px;gap:18px;}
.grid-main-wide{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.col-stack{display:flex;flex-direction:column;gap:18px;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:100px;font-size:12px;font-weight:500;}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10.5px;font-weight:500;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r1);font-size:13.5px;font-weight:500;cursor:pointer;transition:all var(--trans);border:none;font-family:var(--font);}
.btn-primary{background:#6366f1;color:#fff;}.btn-primary:hover{background:#4f46e5;}
.btn-outline{background:transparent;color:var(--text-2);border:1px solid var(--border);}.btn-outline:hover{color:var(--text-1);border-color:var(--border-hi);background:var(--indigo-lo);}
.btn-danger{background:rgba(244,63,94,.12);color:#fb7185;border:1px solid rgba(244,63,94,.25);}.btn-danger:hover{background:rgba(244,63,94,.2);}
.btn-success{background:rgba(16,185,129,.12);color:#34d399;border:1px solid rgba(16,185,129,.25);}.btn-success:hover{background:rgba(16,185,129,.2);}
.btn-warning{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25);}.btn-warning:hover{background:rgba(245,158,11,.2);}
.btn-sm{padding:6px 12px;font-size:12.5px;}.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none;}
.sa-row{display:flex;flex-wrap:wrap;gap:9px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}.sec-title{font-size:13.5px;font-weight:600;}
.tl{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:12px;padding:9px 0;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:16px;top:34px;width:1px;height:calc(100% - 12px);background:var(--border);}
.tl-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid;}
.donut-wrap{display:flex;justify-content:center;margin:12px 0;}
.ql-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;width:100%;min-width:0;overflow:hidden;}
.ql-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:var(--r1);border:1px solid var(--border);background:var(--bg-card2);cursor:pointer;transition:all var(--trans);text-decoration:none;color:var(--text-1);min-width:0;overflow:hidden;}
.ql-item:hover{border-color:var(--border-hi);background:var(--indigo-lo);}
.ql-icon{width:34px;height:34px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.prog{height:5px;border-radius:100px;background:var(--border);overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:100px;transition:width .7s ease;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;color:var(--text-2);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.tbl tr:last-child td{border-bottom:none;}
.input{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--r1);padding:9px 13px;font-size:13.5px;color:var(--text-1);font-family:var(--font);width:100%;outline:none;transition:border var(--trans);}
.input:focus{border-color:#6366f1;}.input::placeholder{color:var(--text-3);}
.field-lbl{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:6px;display:block;}.field-grp{margin-bottom:15px;}
textarea.input{resize:vertical;min-height:70px;line-height:1.5;}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg-app);}
.auth-card{width:100%;max-width:420px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:32px;}
.err-msg{font-size:12px;color:#fb7185;margin-top:8px;min-height:18px;}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--indigo);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;background:var(--bg-app);}
.loading-screen .spinner{width:32px;height:32px;border-width:3px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r2);padding:28px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--indigo);color:#fff;font-size:11px;font-weight:700;margin-right:8px;flex-shrink:0;}
.sql-block{background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--r1);padding:12px;font-family:var(--mono);font-size:11px;color:var(--indigo-hi);white-space:pre;overflow-x:auto;margin-top:6px;line-height:1.6;}
.saved-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;background:rgba(16,185,129,.1);color:#34d399;border:1px solid rgba(16,185,129,.2);opacity:0;transition:opacity .3s;}
.saved-pill.show{opacity:1;}
.pie-row{display:flex;align-items:center;margin-bottom:9px;font-size:12.5px;}
.pie-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:8px;}
.pie-name{color:var(--text-2);flex:1;}.pie-val{font-weight:500;font-family:var(--mono);font-size:12px;}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.task-item:last-child{border-bottom:none;}
.task-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all var(--trans);background:transparent;}
.task-cb.done{background:#6366f1;border-color:#6366f1;}
.task-cb.done::after{content:'✓';font-size:10px;color:#fff;font-weight:700;}
.task-text{font-size:13px;flex:1;line-height:1.4;}
.task-text.done{text-decoration:line-through;color:var(--text-2);}
.task-pri{font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;}
.task-add{display:flex;gap:8px;margin-top:12px;}
.sales-chart{display:flex;align-items:flex-end;gap:4px;height:70px;margin:12px 0 4px;}
.sales-bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.sales-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .5s ease;}
.sales-bar-lbl{font-size:9px;color:var(--text-2);}
.call-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.call-item:last-child{border-bottom:none;}
.call-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.call-info{flex:1;min-width:0;}
.call-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.call-meta{font-size:11px;color:var(--text-2);margin-top:2px;}
.call-dur{font-family:var(--mono);font-size:12px;color:var(--text-2);}
.stabs{display:flex;gap:2px;background:var(--bg-card2);border-radius:var(--r1);padding:3px;margin-bottom:18px;}
.stab{flex:1;padding:7px;text-align:center;font-size:12.5px;font-weight:500;border-radius:5px;cursor:pointer;color:var(--text-2);transition:all var(--trans);border:none;background:none;font-family:var(--font);}
.stab.active{background:var(--bg-card);color:var(--text-1);box-shadow:0 1px 3px rgba(0,0,0,.2);}
.quote-card{background:linear-gradient(135deg,rgba(99,102,241,0.12),rgba(139,92,246,0.08));border:1px solid rgba(99,102,241,0.25);border-radius:var(--r2);padding:16px 20px;margin-bottom:18px;display:flex;align-items:flex-start;gap:12px;}
.quote-icon{font-size:24px;flex-shrink:0;margin-top:2px;}
.quote-text{font-size:13.5px;color:var(--text-1);font-style:italic;line-height:1.6;flex:1;}
.quote-author{font-size:11px;color:var(--indigo-hi);margin-top:4px;font-weight:500;}
.data-loading{display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:12px;padding:12px 0;}
.tl-checkout-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:500;margin-top:4px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}.pulse{animation:pulse 2s infinite;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}.fade-up{animation:fadeUp .3s ease both;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@media(max-width:1100px){.grid5{grid-template-columns:repeat(3,1fr);}.grid-main{grid-template-columns:1fr;}.ql-grid{grid-template-columns:repeat(2,1fr);width:100%;min-width:0;}}
@media(max-width:960px){.grid4{grid-template-columns:repeat(2,1fr);}.sidebar{width:58px;}.sidebar .logo-text,.sidebar .nav-lbl,.sidebar .user-info{opacity:0;width:0;pointer-events:none;}.grid-main-wide{grid-template-columns:1fr;}}
@media(max-width:600px){.content{padding:12px;}.grid4{grid-template-columns:1fr 1fr;}.grid5{grid-template-columns:repeat(2,1fr);}.topbar{padding:0 12px;gap:6px;}.ql-grid{grid-template-columns:repeat(2,1fr);width:100%;min-width:0;}.ql-item{padding:9px 10px;gap:8px;}.modal-box{padding:18px;}.quote-card{padding:12px 14px;}}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
</head>

</div>

function mk(tag,cls,style){var e=document.createElement(tag);if(cls)e.className=cls;if(style)Object.assign(e.style,style);return e;}
function dv(cls,style){return mk('div',cls||'',style);}
function sp(cls){return mk('span',cls||'');}
function txt(s){return document.createTextNode(String(s));}
function app(){var p=arguments[0];for(var i=1;i<arguments.length;i++){var c=arguments[i];if(!c&&c!==0)continue;if(typeof c==='string'||typeof c==='number')p.appendChild(txt(c));else if(c instanceof Node)p.appendChild(c);}return p;}
function btn(cls,label,fn,disabled){var b=mk('button','btn '+cls);b.textContent=label;if(fn)b.addEventListener('click',fn);if(disabled)b.disabled=true;return b;}
function inp(cls,type,ph,val){var i=mk('input',cls);i.type=type||'text';if(ph)i.placeholder=ph;if(val!=null)i.value=val;return i;}
function Av(init,sz){return app(dv('avatar av-'+(sz||'sm')),init||'?');}
function SBadge(status){
  var c=SC[status]||SC['checked-out'],b=dv('badge');
  b.style.background=c.bg;b.style.color=c.color;
  var dot=sp();dot.textContent=c.icon;if(status!=='checked-out')dot.classList.add('pulse');
  return app(b,dot,' '+c.label);
}
function LogoMark(){

  var img=mk('img');img.src=__LOGO__;img.style.cssText='width:32px;height:32px;object-fit:cover;border-radius:9px;display:block;';
  lm.appendChild(img);

}
function StatCard(label,val,sub,accentColor){
  var c=dv('card card-sm fade-up');
  if(accentColor)c.style.borderColor=accentColor+'40';
  var l=dv('card-lbl');l.textContent=label;
  var v=dv('card-val');v.textContent=String(val);
  if(accentColor)v.style.color=accentColor;
  app(c,l,v);
  if(sub){var s=dv('card-sub');s.textContent=sub;c.appendChild(s);}
  return c;
}

function nowISO(){return new Date().toISOString();}

// ✅ FIX 1: Use LOCAL date (not UTC). This is the main bug fix.
// At 00:37 IST, toISOString() returns the PREVIOUS day (UTC-5:30 behind IST).
// Now we use getFullYear/getMonth/getDate which respect the device's local timezone.
function todayStr(){
  var d=new Date();
  var y=d.getFullYear();
  var m=String(d.getMonth()+1).padStart(2,'0');
  var dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

function fmt(m){if(!m||m<=0)return'0m';var h=Math.floor(m/60),mn=Math.round(m%60);return h>0?h+'h '+mn+'m':mn+'m';}
function minBetween(a,b){if(!a)return 0;return Math.max(0,Math.round(((b?new Date(b):new Date())-new Date(a))/60000));}
function fmtT(iso){if(!iso)return'\u2014';return new Date(iso).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});}
function nowFull(){return new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}
function now5(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtMoney(n){if(n>=100000)return'\u20b9'+(n/100000).toFixed(1)+'L';if(n>=1000)return'\u20b9'+(n/1000).toFixed(1)+'K';return'\u20b9'+n.toLocaleString('en-IN');}

function genSalesHistory(){
  var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], d=new Date(), arr=[];
  for(var i=6;i>=0;i--){
    var dt=new Date(d); dt.setDate(dt.getDate()-i);
    // ✅ Also use local date here for consistency
    var dy=dt.getFullYear();var dm=String(dt.getMonth()+1).padStart(2,'0');var ddd=String(dt.getDate()).padStart(2,'0');
    arr.push({ day:days[dt.getDay()===0?6:dt.getDay()-1], date:dy+'-'+dm+'-'+ddd, amount:0 });
  }
  return arr;
}

async function dbLoadSales(){
  if(!sb||!APP.profile)return;

  // ✅ Use local date for from-date too
  var fy=from.getFullYear();var fm=String(from.getMonth()+1).padStart(2,'0');var fdd=String(from.getDate()).padStart(2,'0');
  var fromStr=fy+'-'+fm+'-'+fdd;

  var history=genSalesHistory();

  (r.data||[]).forEach(function(row){byDate[row.work_date]=(byDate[row.work_date]||0)+row.amount;});
  history.forEach(function(d){d.amount=byDate[d.date]||0;});
  APP.salesHistory=history;
  APP.todaySales=byDate[todayStr()]||0;
}
async function dbAddSale(amount){
  if(!sb||!APP.profile)return null;
  var existing=await sb.from('user_sales').select('*').eq('user_id',APP.profile.id).eq('work_date',todayStr()).single();
  if(existing.data){
    var newAmt=(existing.data.amount||0)+amount;
    await sb.from('user_sales').update({amount:newAmt}).eq('id',existing.data.id).eq('user_id',APP.profile.id);
    APP.todaySales=newAmt;
  } else {
    await sb.from('user_sales').insert({user_id:APP.profile.id,work_date:todayStr(),amount:amount});
    APP.todaySales=amount;
  }
  var entry=APP.salesHistory.find(function(d){return d.date===todayStr();});
  if(entry)entry.amount=APP.todaySales;
}
async function dbResetSales(){
  if(!sb||!APP.profile)return;
  await sb.from('user_sales').delete().eq('user_id',APP.profile.id).eq('work_date',todayStr());

  var entry=APP.salesHistory.find(function(d){return d.date===todayStr();});
  if(entry)entry.amount=0;
}

async function loadTeam(){
  if(!sb)return[];
  var r=await sb.from('profiles').select('*');
  if(r.error)return[];
  var today=todayStr(),result=[];
  for(var i=0;i<r.data.length;i++){
    var p=r.data[i];
    var sr=await sb.from('sessions').select('*').eq('user_id',p.id).eq('work_date',today).order('started_at',{ascending:true});
    var tl=sr.data||[];
    var open=tl.find(function(s){return!s.ended_at;});
    var wm=tl.filter(function(s){return s.ended_at&&s.type==='checked-in';}).reduce(function(a,s){return a+(s.duration_minutes||0);},0)+(open&&open.type==='checked-in'?minBetween(open.started_at):0);
    result.push({id:p.id,name:p.full_name,avatar:p.avatar_initials,role:p.role,status:open?open.type:'checked-out',workMin:wm,sessions:tl.length});
  }
  return result;
}

var SQL_BASE=`-- ① PROFILES
create table profiles (
  id uuid references auth.users primary key,
  full_name text not null,
  avatar_initials text default 'U',
  role text default 'Staff',
  created_at timestamptz default now()
);
alter table profiles enable row level security;
create policy "read"   on profiles for select using (auth.role() = 'authenticated');
create policy "update" on profiles for update using (auth.uid() = id);
create policy "insert" on profiles for insert with check (auth.uid() = id);

-- ② SESSIONS
create table sessions (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references profiles(id) not null,
  type text not null,
  work_date date not null,
  started_at timestamptz not null,
  ended_at timestamptz,
  duration_minutes integer,
  created_at timestamptz default now()
);
alter table sessions enable row level security;
create policy "read"   on sessions for select using (auth.role() = 'authenticated');
create policy "insert" on sessions for insert with check (auth.uid() = user_id);
create policy "update" on sessions for update using (auth.uid() = user_id);
create policy "delete" on sessions for delete using (auth.uid() = user_id);`;

create table user_tasks (
  id uuid default gen_random_uuid() primary key,

  done boolean default false,
  priority text default 'medium',
  work_date date not null,
  created_at timestamptz default now()
);
alter table user_tasks enable row level security;
create policy "read"   on user_tasks for select using (auth.uid() = user_id);
create policy "insert" on user_tasks for insert with check (auth.uid() = user_id);
create policy "update" on user_tasks for update using (auth.uid() = user_id);
create policy "delete" on user_tasks for delete using (auth.uid() = user_id);

-- ④ USER CALLS
create table user_calls (

// ─── SALES MINI CHART ────────────────────────────────────────────────────────
function SalesMiniChart(data){
  var max=Math.max.apply(null,data.map(function(d){return d.amount;}));
  if(max<=0)max=1;
  var wrap=dv('sales-chart');
  data.forEach(function(d){
    var col=dv('sales-bar-col');
    var bar=dv('sales-bar');
    var isToday=d.date===todayStr();
    var height=max<=1?2:Math.max(4,Math.round(d.amount/max*60));
    bar.style.height=height+'px';
    bar.style.background=isToday?'#6366f1':'rgba(99,102,241,0.4)';
    if(isToday)bar.style.boxShadow='0 0 8px rgba(99,102,241,0.5)';
    var lbl=dv('sales-bar-lbl');lbl.textContent=d.day;
    app(col,bar,lbl);wrap.appendChild(col);
  });
  return wrap;
}

// ─── DONUT CHART ─────────────────────────────────────────────────────────────
function Donut(segs){
  var r=40,cx=50,cy=50,sw=14,circ=2*Math.PI*r;
  var total=segs.reduce(function(a,s){return a+s.v;},0)||1;
  var ns='http://www.w3.org/2000/svg';
  var svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 100 100');svg.setAttribute('width','110');svg.setAttribute('height','110');
  function ce(attrs){var c=document.createElementNS(ns,'circle');Object.keys(attrs).forEach(function(k){c.setAttribute(k,attrs[k]);});return c;}
  svg.appendChild(ce({cx:cx,cy:cy,r:r,fill:'none',stroke:'var(--border)','stroke-width':sw}));
  svg.appendChild(ce({cx:cx,cy:cy,r:r-sw/2-3,fill:'var(--bg-card2)'}));
  var off=0;
  segs.forEach(function(s){
    if(s.v<=0)return;
    var dash=(s.v/total)*circ;
    svg.appendChild(ce({cx:cx,cy:cy,r:r,fill:'none',stroke:s.color,'stroke-width':sw,'stroke-dasharray':dash+' '+(circ-dash),'stroke-dashoffset':circ*0.25-off,'stroke-linecap':'round'}));
    off+=dash;
  });
  return svg;
}

// ─── TOTALS HELPER ───────────────────────────────────────────────────────────
function totals(sessions){
  var w=0,b=0,m=0,c=0,f=0;
  sessions.filter(function(s){return s.ended_at;}).forEach(function(s){
    var d=s.duration_minutes||0;
    if(s.type==='checked-in')w+=d;if(s.type==='break')b+=d;
    if(s.type==='meeting')m+=d;if(s.type==='call')c+=d;
    // ✅ FIX: was 'focus' check - now consistent with lowercase key
    if(s.type==='focus')f+=d;
  });
  var open=sessions.find(function(s){return!s.ended_at;});
  if(open){var cur=minBetween(open.started_at);
    if(open.type==='checked-in')w+=cur;if(open.type==='break')b+=cur;
    if(open.type==='meeting')m+=cur;if(open.type==='call')c+=cur;if(open.type==='focus')f+=cur;}
  return{work:w,brk:b,meet:m,call:c,focus:f,total:w+b+m+c+f};
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.body.setAttribute('data-theme',APP.theme);
  var root=document.getElementById('app');root.innerHTML='';
  if(APP.showSetup){root.appendChild(SetupModal(!!APP.authUser));return;}
  if(!APP.ready){
    var ls=dv('loading-screen');app(ls,dv('spinner'),app(dv('','color:var(--text-2);font-size:13px;'),'Connecting\u2026'));
    root.appendChild(ls);return;
  }
  if(!APP.authUser||!APP.profile){root.appendChild(AuthView());return;}
  var views={dashboard:Dashboard,analytics:Analytics,history:History,team:Team,settings:Settings};
  var View=views[APP.page]||Dashboard;
  var appEl=dv('app');appEl.appendChild(Sidebar());
  var mainEl=dv('main');mainEl.appendChild(Topbar());
  var content=dv('content');content.appendChild(View());
  mainEl.appendChild(content);appEl.appendChild(mainEl);root.appendChild(appEl);
}

// ─── TIMERS ──────────────────────────────────────────────────────────────────
// Clock tick every 30s
setInterval(function(){var c=document.getElementById('live-clock');if(c)c.textContent=now5();},30000);

// ✅ FIX 3: Midnight date-change watcher (checks every 60s)
// When the local date changes (e.g. 23:59 → 00:00), reload all data automatically
// This ensures dashboard, tasks, calls, and sales all reset to the new day
var _lastTrackedDate=todayStr();
setInterval(function(){
  var currentDate=todayStr();
  if(currentDate!==_lastTrackedDate){
    _lastTrackedDate=currentDate;
    console.log('[NexaFlow] Date changed to '+currentDate+' — refreshing data');
    if(APP.authUser&&APP.profile){
      APP.quoteIndex=Math.floor(Math.random()*QUOTES.length);
      APP.historyDate=null; // reset history picker to new today
      loadAllUserData().then(function(){render();});
    }
  }
},60000);

// ─── BOOT ────────────────────────────────────────────────────────────────────
async function boot(){
  document.body.setAttribute('data-theme',APP.theme);
  var msgEl=document.getElementById('load-msg');
  try{
    sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:false}});
  }catch(e){APP.ready=true;APP.showSetup=true;render();return;}
  if(msgEl)msgEl.textContent='Checking session\u2026';
  try{
    var gs=await sb.auth.getSession();
    var session=gs&&gs.data&&gs.data.session;
    if(session&&session.user){
      APP.authUser=session.user;
      if(msgEl)msgEl.textContent='Loading profile\u2026';
      APP.profile=await loadProfile(session.user.id);
      if(APP.profile){
        if(msgEl)msgEl.textContent='Syncing your data\u2026';
        await loadAllUserData();
      }
    }
  }catch(e){console.error(e);}
  APP.ready=true;render();

  sb.auth.onAuthStateChange(async function(event,session){
    if(event==='SIGNED_IN'&&session&&session.user){
      APP.authUser=session.user;
      APP.profile=await loadProfile(session.user.id);
      if(APP.profile){
        APP.quoteIndex=Math.floor(Math.random()*QUOTES.length);
        await loadAllUserData();
      }
      render();
    }else if(event==='SIGNED_OUT'){
      APP.authUser=null;APP.profile=null;APP.status='checked-out';
      APP.timeline=[];APP.currentSession=null;
      APP.tasks=[];APP.calls=[];APP.salesHistory=[];APP.todaySales=0;APP.dataLoaded=false;
      render();
    }
  });
}

waitForSDK(function(err){
  if(err){
    document.getElementById('app').innerHTML='<div class="loading-screen"><div style="color:#fb7185;font-size:14px;text-align:center;max-width:300px;">\u26a0\ufe0f Could not load Supabase SDK.<br><br>Check your internet connection and refresh.</div></div>';
    return;
  }
  boot();
});
